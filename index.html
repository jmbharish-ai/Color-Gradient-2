<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <style>
            button{
                width: 50px; height: 50px;
                border: 2px solid black; border-radius: 0px;
            }
            input{
                width: 100px; height: 30px;
                background-color: white; color: black;
                font-size: 25px; font-family: Arial;
                border: 5px solid white; border-radius: 0px;
            }
        </style>
    </head>
    <body onclick="gradient()">
        <div>
            <p>Left</p>
            <input type="number" id="rTL">
            <input type="number" id="gTL">
            <input type="number" id="bTL">
            <p>Right</p>
            <input type="number" id="rTR">
            <input type="number" id="gTR">
            <input type="number" id="bTR">
            <br><br>
            <div id="gradient"></div>
            <br><br>
            <p>Left</p>
            <input type="number" id="rBL">
            <input type="number" id="gBL">
            <input type="number" id="bBL">
            <p>Right</p>
            <input type="number" id="rBR">
            <input type="number" id="gBR">
            <input type="number" id="bBR">
        </div>
        <script>
            var divisions=19;
            for(var i=0; i<divisions; i++){
                for(var j=0; j<divisions; j++){
                    button=document.createElement("button");
                    button.id="button"+i+","+j;
                    document.getElementById("gradient").appendChild(button);
                }
                document.getElementById("gradient").appendChild(document.createElement("br"));
            }
            function gradient(){
                //left
                var rTL=document.getElementById("rTL").value; //top
                var gTL=document.getElementById("gTL").value;
                var bTL=document.getElementById("bTL").value;
                var rBL=document.getElementById("rBL").value; //bottom
                var gBL=document.getElementById("gBL").value;
                var bBL=document.getElementById("bBL").value;

                //right
                var rTR=document.getElementById("rTR").value; //top
                var gTR=document.getElementById("gTR").value;
                var bTR=document.getElementById("bTR").value;
                var rBR=document.getElementById("rBR").value; //bottom
                var gBR=document.getElementById("gBR").value;
                var bBR=document.getElementById("bBR").value;

                for(var i=0; i<divisions; i++){
                    var place=1-i/divisions;
                    var rL=Math.round(place*rTL+(1-place)*rBL);
                    var gL=Math.round(place*gTL+(1-place)*gBL);
                    var bL=Math.round(place*bTL+(1-place)*bBL);

                    var rR=Math.round(place*rTR+(1-place)*rBR);
                    var gR=Math.round(place*gTR+(1-place)*gBR);
                    var bR=Math.round(place*bTR+(1-place)*bBR);

                    for(var j=0; j<divisions; j++){
                        var place_=1-j/divisions;
                        var r=Math.round(place_*rL+(1-place_)*rR);
                        var g=Math.round(place_*gL+(1-place_)*gR);
                        var b=Math.round(place_*bL+(1-place_)*bR);
                        document.getElementById("button"+i+","+j).style.backgroundColor="rgb("+r+", "+g+", "+b+")";
                    }
                }
            }
        </script>
    </body>
</html>
